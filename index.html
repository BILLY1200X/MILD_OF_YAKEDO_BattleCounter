<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>MILD OF YAKEDO Battle Counter</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #121417;
      --panel: #171b20;
      --panel-2: #1f252c;
      --text: #f3f0ea;
      --muted: #8f9aa6;
      --line: #303844;
      --hp: #e04b62;
      --dp: #42a7c8;
      --accent: #d7b25e;
      --good: #78d98c;
      --shadow: 0 14px 34px rgba(0, 0, 0, .28);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100svh;
      background: linear-gradient(180deg, #171513 0%, #101418 45%, #0c0f12 100%);
      color: var(--text);
      display: flex;
      justify-content: center;
      touch-action: manipulation;
    }

    button,
    input {
      font: inherit;
    }

    .app {
      width: min(100%, 430px);
      min-height: 100svh;
      padding: max(12px, env(safe-area-inset-top)) 16px max(14px, env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .title {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 12px;
      min-height: 36px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.02rem, 5.2vw, 1.48rem);
      line-height: .92;
      letter-spacing: 0;
      font-weight: 850;
    }

    .subtitle {
      margin-top: 5px;
      color: var(--muted);
      font-size: .68rem;
      font-weight: 750;
    }

    .reset {
      border: 1px solid var(--line);
      background: rgba(23, 27, 32, .82);
      color: var(--muted);
      width: 36px;
      height: 36px;
      border-radius: 7px;
      font-size: .95rem;
    }

    .setup {
      margin: auto 0;
      display: grid;
      gap: 14px;
    }

    .setup h2 {
      margin: 0 0 2px;
      font-size: 1.22rem;
    }

    .setup p {
      margin: 0 0 10px;
      color: var(--muted);
      line-height: 1.6;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .choice-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .choice {
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #0f1317;
      color: var(--muted);
      font-weight: 850;
    }

    .choice.is-selected {
      border-color: rgba(66, 167, 200, .76);
      background: rgba(66, 167, 200, .16);
      color: var(--text);
    }

    label {
      color: var(--muted);
      font-size: .88rem;
      font-weight: 700;
    }

    input {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #0f1317;
      color: var(--text);
      padding: 8px 12px;
      font-size: 1rem;
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(242, 193, 78, .18);
    }

    .primary {
      min-height: 48px;
      border: 0;
      border-radius: 7px;
      background: var(--accent);
      color: #1c1604;
      font-size: 1rem;
      font-weight: 900;
      box-shadow: var(--shadow);
    }

    .battle {
      display: none;
      flex: 1;
      flex-direction: column;
      gap: 10px;
    }

    .dice-zone {
      display: grid;
      place-items: center;
      gap: 10px;
      padding: 0;
    }

    .dice {
      width: min(20vw, 78px);
      aspect-ratio: 1;
      border-radius: 12px;
      background: linear-gradient(145deg, #f4f1ea, #d9d9d4);
      box-shadow: inset -5px -6px 10px rgba(57, 64, 74, .18), inset 4px 4px 8px rgba(255, 255, 255, .74), 0 10px 24px rgba(0, 0, 0, .24);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      padding: 9px;
      transform: rotate(-2deg);
    }

    .pip {
      width: 40%;
      aspect-ratio: 1;
      align-self: center;
      justify-self: center;
      border-radius: 50%;
      background: #181c21;
      opacity: 0;
      box-shadow: inset 2px 3px 4px rgba(255, 255, 255, .12);
    }

    .dice[data-value="1"] .pip:nth-child(5),
    .dice[data-value="2"] .pip:nth-child(1),
    .dice[data-value="2"] .pip:nth-child(9),
    .dice[data-value="3"] .pip:nth-child(1),
    .dice[data-value="3"] .pip:nth-child(5),
    .dice[data-value="3"] .pip:nth-child(9),
    .dice[data-value="4"] .pip:nth-child(1),
    .dice[data-value="4"] .pip:nth-child(3),
    .dice[data-value="4"] .pip:nth-child(7),
    .dice[data-value="4"] .pip:nth-child(9),
    .dice[data-value="5"] .pip:nth-child(1),
    .dice[data-value="5"] .pip:nth-child(3),
    .dice[data-value="5"] .pip:nth-child(5),
    .dice[data-value="5"] .pip:nth-child(7),
    .dice[data-value="5"] .pip:nth-child(9),
    .dice[data-value="6"] .pip:nth-child(1),
    .dice[data-value="6"] .pip:nth-child(3),
    .dice[data-value="6"] .pip:nth-child(4),
    .dice[data-value="6"] .pip:nth-child(6),
    .dice[data-value="6"] .pip:nth-child(7),
    .dice[data-value="6"] .pip:nth-child(9) {
      opacity: 1;
    }

    .dice.rolling {
      animation: roll .34s ease;
    }

    @keyframes roll {
      0% { transform: rotate(-2deg) scale(1); }
      50% { transform: rotate(8deg) scale(.96); }
      100% { transform: rotate(-2deg) scale(1); }
    }

    .roll {
      width: 100%;
      min-height: 44px;
      border: 1px solid rgba(215, 178, 94, .42);
      border-radius: 7px;
      background: linear-gradient(180deg, #262217, #1b1a16);
      color: #f5df9f;
      font-size: .98rem;
      font-weight: 850;
    }

    .roll:disabled {
      color: rgba(245, 223, 159, .68);
      opacity: .82;
    }

    .result {
      width: 100%;
      min-height: 58px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: rgba(23, 27, 32, .82);
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 9px 12px;
    }

    .result small {
      display: block;
      color: var(--muted);
      font-size: .72rem;
      font-weight: 750;
      margin-bottom: 1px;
    }

    .damage {
      color: var(--good);
      font-size: 1.55rem;
      font-weight: 900;
      line-height: 1;
    }

    .meters {
      display: grid;
      gap: 10px;
      margin-top: 2px;
    }

    .meter {
      border: 1px solid var(--line);
      border-radius: 7px;
      background: rgba(23, 27, 32, .88);
      padding: 10px 12px;
      display: grid;
      gap: 9px;
    }

    .meter-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
    }

    .meter-name {
      font-size: .84rem;
      font-weight: 850;
    }

    .meter-value {
      color: var(--muted);
      font-size: .84rem;
      font-weight: 800;
    }

    .meter-value.warning {
      color: #f0d27a;
    }

    .bar {
      height: 12px;
      border-radius: 999px;
      overflow: hidden;
      background: #101318;
      border: 1px solid rgba(255, 255, 255, .08);
    }

    .fill {
      width: var(--percent);
      height: 100%;
      border-radius: inherit;
      transition: width .2s ease;
    }

    .fill.hp {
      background: linear-gradient(90deg, #a72f43, var(--hp));
    }

    .fill.dp {
      background: linear-gradient(90deg, #277da1, var(--dp));
    }

    .fill.cost {
      background: linear-gradient(90deg, #d7b25e, #f0d27a);
    }

    .mini {
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--panel-2);
      color: var(--text);
      font-size: .88rem;
      font-weight: 850;
    }

    .direct {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .cost-tools {
      display: grid;
      grid-template-columns: 1fr 72px 104px;
      gap: 8px;
    }

    .battle-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="title">
      <div>
        <h1>MILD OF<br>YAKEDO</h1>
        <div class="subtitle">低温のYAKEDO / Battle Counter</div>
      </div>
      <button class="reset hidden" id="resetButton" type="button" aria-label="リセット">↻</button>
    </header>

    <section class="setup" id="setup">
      <div>
        <h2 id="setupTitle">初期値入力</h2>
        <p id="setupLead">HPとDPを入れたら開始。サイコロは 1-6、与ダメージは「出目 - DP」です。</p>
      </div>
      <div class="field">
        <label for="maxHp">HP</label>
        <input id="maxHp" type="text" inputmode="numeric" pattern="[0-9]*" value="10">
      </div>
      <div class="field">
        <label>DP</label>
        <div class="choice-grid" id="dpChoices" role="group" aria-label="DP">
          <button class="choice" type="button" data-dp="1">1</button>
          <button class="choice is-selected" type="button" data-dp="2">2</button>
          <button class="choice" type="button" data-dp="3">3</button>
          <button class="choice" type="button" data-dp="4">4</button>
        </div>
      </div>
      <section class="meter" id="setupCostSection">
        <div class="meter-head">
          <div class="meter-name">コスト</div>
          <div class="meter-value" id="setupCostText">0 / 15</div>
        </div>
        <div class="bar" aria-hidden="true">
          <div class="fill cost" id="setupCostFill" style="--percent: 0%"></div>
        </div>
        <div class="cost-tools">
          <input id="setupCostInput" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="残り 15">
          <button class="mini" id="setupCostSetButton" type="button">セット</button>
          <button class="mini" id="setupCostResetButton" type="button">コストリセット</button>
        </div>
      </section>
      <button class="primary" id="startButton" type="button">開始</button>
    </section>

    <section class="battle" id="battle" aria-live="polite">
      <div class="dice-zone">
        <div class="dice" id="dice" data-value="1" aria-label="サイコロの目 1">
          <span class="pip"></span><span class="pip"></span><span class="pip"></span>
          <span class="pip"></span><span class="pip"></span><span class="pip"></span>
          <span class="pip"></span><span class="pip"></span><span class="pip"></span>
        </div>
        <button class="roll" id="rollButton" type="button">YAKE道 GO!</button>
      </div>

      <div class="result">
        <div>
          <small id="formula">1 - DP 0</small>
          <strong>相手へのダメージ</strong>
        </div>
        <div class="damage" id="damage">1</div>
      </div>

      <div class="meters">
        <section class="meter">
          <div class="meter-head">
            <div class="meter-name">HP</div>
            <div class="meter-value" id="hpText">10 / 10</div>
          </div>
          <div class="bar" aria-hidden="true">
            <div class="fill hp" id="hpFill" style="--percent: 100%"></div>
          </div>
          <div class="direct">
            <input id="currentHp" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="現在HP" aria-label="現在HP">
          </div>
        </section>

        <section class="meter">
          <div class="meter-head">
            <div class="meter-name">DP</div>
            <div class="meter-value" id="dpText">2</div>
          </div>
          <div class="bar" aria-hidden="true">
            <div class="fill dp" id="dpFill" style="--percent: 50%"></div>
          </div>
        </section>

        <div class="battle-actions">
          <button class="mini" id="warriorChangeButton" type="button">YAKE道 戦士チェンジ</button>
          <button class="mini" id="topButton" type="button">トップに戻る</button>
        </div>
      </div>
    </section>
  </main>

  <script>
    const setup = document.querySelector("#setup");
    const battle = document.querySelector("#battle");
    const setupTitle = document.querySelector("#setupTitle");
    const setupLead = document.querySelector("#setupLead");
    const resetButton = document.querySelector("#resetButton");
    const startButton = document.querySelector("#startButton");
    const warriorChangeButton = document.querySelector("#warriorChangeButton");
    const topButton = document.querySelector("#topButton");
    const rollButton = document.querySelector("#rollButton");
    const dice = document.querySelector("#dice");
    const damage = document.querySelector("#damage");
    const formula = document.querySelector("#formula");
    const maxHpInput = document.querySelector("#maxHp");
    const dpChoices = document.querySelector("#dpChoices");
    const dpButtons = [...document.querySelectorAll("[data-dp]")];
    const currentHpInput = document.querySelector("#currentHp");
    const hpText = document.querySelector("#hpText");
    const hpFill = document.querySelector("#hpFill");
    const dpText = document.querySelector("#dpText");
    const dpFill = document.querySelector("#dpFill");
    const setupCostSection = document.querySelector("#setupCostSection");
    const setupCostText = document.querySelector("#setupCostText");
    const setupCostFill = document.querySelector("#setupCostFill");
    const setupCostInput = document.querySelector("#setupCostInput");
    const setupCostSetButton = document.querySelector("#setupCostSetButton");
    const setupCostResetButton = document.querySelector("#setupCostResetButton");

    let maxHp = 10;
    let hp = 10;
    let dp = 2;
    let cost = 0;
    let costOver = false;
    let lastRoll = 1;
    let isRolling = false;
    let rollIntervalId = 0;
    let rollTimeoutId = 0;

    const clamp = (value, min, max) => Math.min(Math.max(value, min), max);
    const readNumber = (input, fallback) => {
      const value = Number(input.value);
      return Number.isFinite(value) ? value : fallback;
    };

    function updateMeters(syncHpInput = false) {
      const hpPercent = maxHp > 0 ? clamp((hp / maxHp) * 100, 0, 100) : 0;
      const dpPercent = clamp((dp / 4) * 100, 0, 100);
      hpText.textContent = `${hp} / ${maxHp}`;
      if (syncHpInput) currentHpInput.value = hp;
      hpFill.style.setProperty("--percent", `${hpPercent}%`);
      dpText.textContent = dp;
      dpFill.style.setProperty("--percent", `${dpPercent}%`);
      updateCost();
    }

    function updateCost() {
      const costPercent = clamp((cost / 15) * 100, 0, 100);
      const costLabel = `${cost} / 15`;
      setupCostText.textContent = costOver ? `コストオーバー ${costLabel}` : costLabel;
      setupCostText.classList.toggle("warning", costOver);
      setupCostFill.style.setProperty("--percent", `${costPercent}%`);
      setupCostInput.placeholder = cost >= 15 ? "MAX" : `残り ${15 - cost}`;
    }

    function setCost() {
      if (setupCostInput.value === "") return;
      const addCost = Math.max(Math.floor(readNumber(setupCostInput, 0)), 0);
      if (cost + addCost > 15) {
        costOver = true;
        setupCostInput.value = "";
        updateCost();
        setupCostInput.focus();
        return;
      }
      costOver = false;
      cost += addCost;
      setupCostInput.value = "";
      updateCost();
      setupCostInput.focus();
    }

    function resetCost() {
      cost = 0;
      costOver = false;
      setupCostInput.value = "";
      updateCost();
    }

    function selectDp(value) {
      dp = clamp(Math.floor(value), 1, 4);
      dpButtons.forEach((button) => {
        button.classList.toggle("is-selected", Number(button.dataset.dp) === dp);
      });
      updateMeters();
      updateDamage();
    }

    function showDice(value) {
      dice.dataset.value = String(value);
      dice.setAttribute("aria-label", `サイコロの目 ${value}`);
    }

    function updateDamage() {
      const dealt = Math.max(lastRoll - dp, 0);
      showDice(lastRoll);
      damage.textContent = dealt;
      formula.textContent = `${lastRoll} - DP ${dp}`;
    }

    function stopRolling() {
      if (rollIntervalId) window.clearInterval(rollIntervalId);
      if (rollTimeoutId) window.clearTimeout(rollTimeoutId);
      rollIntervalId = 0;
      rollTimeoutId = 0;
      isRolling = false;
      rollButton.disabled = false;
      rollButton.textContent = "YAKE道 GO!";
    }

    function showSetup(includeCost) {
      stopRolling();
      battle.style.display = "none";
      setup.classList.remove("hidden");
      resetButton.classList.add("hidden");
      setupCostSection.classList.toggle("hidden", !includeCost);
      setupTitle.textContent = includeCost ? "初期値入力" : "YAKE道 戦士チェンジ";
      setupLead.textContent = includeCost
        ? "HPとDPを入れたら開始。サイコロは 1-6、与ダメージは「出目 - DP」です。"
        : "HPとDPだけ設定して、次の戦士でYAKE道 GO!";
      maxHpInput.value = maxHp;
      updateCost();
    }

    function startBattle() {
      maxHp = clamp(Math.floor(readNumber(maxHpInput, 10)), 1, 10);
      maxHpInput.value = maxHp;
      hp = maxHp;
      dp = clamp(dp, 1, 4);
      setup.classList.add("hidden");
      battle.style.display = "flex";
      resetButton.classList.remove("hidden");
      updateMeters(true);
      updateCost();
      updateDamage();
    }

    function rollDice() {
      if (isRolling) return;
      isRolling = true;
      rollButton.disabled = true;
      rollButton.textContent = "YAKE道...";
      dice.classList.remove("rolling");
      void dice.offsetWidth;
      dice.classList.add("rolling");

      let face = 1;
      rollIntervalId = window.setInterval(() => {
        showDice(face);
        face = face >= 6 ? 1 : face + 1;
      }, 55);

      rollTimeoutId = window.setTimeout(() => {
        window.clearInterval(rollIntervalId);
        rollIntervalId = 0;
        rollTimeoutId = 0;
        lastRoll = Math.floor(Math.random() * 6) + 1;
        updateDamage();
        isRolling = false;
        rollButton.disabled = false;
        rollButton.textContent = "YAKE道 GO!";
      }, 1000);
    }

    function setCurrentHp() {
      if (currentHpInput.value === "") return;
      const nextHp = clamp(Math.floor(readNumber(currentHpInput, hp)), 0, maxHp);
      hp = nextHp;
      if (Number(currentHpInput.value) !== nextHp) currentHpInput.value = nextHp;
      updateMeters();
    }

    function resetApp() {
      showSetup(true);
    }

    startButton.addEventListener("click", startBattle);
    rollButton.addEventListener("click", rollDice);
    warriorChangeButton.addEventListener("click", () => showSetup(false));
    topButton.addEventListener("click", () => showSetup(true));
    currentHpInput.addEventListener("input", setCurrentHp);
    resetButton.addEventListener("click", resetApp);
    setupCostSetButton.addEventListener("click", setCost);
    setupCostResetButton.addEventListener("click", resetCost);
    setupCostInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") setCost();
    });
    dpChoices.addEventListener("click", (event) => {
      const button = event.target.closest("[data-dp]");
      if (!button) return;
      selectDp(Number(button.dataset.dp));
    });

    [maxHpInput, currentHpInput, setupCostInput].forEach((input) => {
      input.addEventListener("focus", () => {
        window.setTimeout(() => input.select(), 0);
      });
      input.addEventListener("pointerup", (event) => {
        event.preventDefault();
        input.select();
      });
    });

    [maxHpInput].forEach((input) => {
      input.addEventListener("keydown", (event) => {
        if (event.key === "Enter") startBattle();
      });
    });
  </script>
</body>
</html>
